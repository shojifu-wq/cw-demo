<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatwork ルーム設計デモツール</title>
<style>
:root {
  --primary: #2C6EAB;
  --primary-light: #E8F1FA;
  --primary-dark: #1B4D7A;
  --accent: #E85D3A;
  --bg: #F5F7FA;
  --card: #FFFFFF;
  --border: #DDE3EA;
  --text: #2D3748;
  --text-light: #718096;
  --success: #38A169;
  --warning: #D69E2E;
  --danger: #E53E3E;
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

/* Header */
.header { background: var(--primary); color: white; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 600; }
.header-sub { font-size: 12px; opacity: 0.8; }

/* Step indicator */
.steps { display: flex; justify-content: center; padding: 16px 24px; background: white; border-bottom: 1px solid var(--border); }
.step-item { display: flex; align-items: center; gap: 6px; padding: 6px 16px; font-size: 13px; color: var(--text-light); position: relative; }
.step-item.active { color: var(--primary); font-weight: 600; }
.step-item.completed { color: var(--success); }
.step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 2px solid var(--border); background: white; }
.step-item.active .step-num { border-color: var(--primary); background: var(--primary); color: white; }
.step-item.completed .step-num { border-color: var(--success); background: var(--success); color: white; }
.step-arrow { margin: 0 4px; color: var(--border); }

/* Main */
.main { max-width: 960px; margin: 0 auto; padding: 24px; }
.main.full-width { max-width: 100%; padding: 16px 24px; }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; }
.card h2 { font-size: 18px; margin-bottom: 16px; color: var(--primary-dark); }
.card h3 { font-size: 15px; margin-bottom: 12px; color: var(--text); }

/* Forms */
label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.label-hint { font-weight: 400; color: var(--text-light); margin-left: 8px; }
input[type="text"], textarea, select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; }
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,110,171,0.1); }
.form-group { margin-bottom: 20px; }

/* Industry cards */
.industry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.industry-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all 0.15s; text-align: center; }
.industry-card:hover { border-color: var(--primary); background: var(--primary-light); }
.industry-card.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 3px rgba(44,110,171,0.15); }
.industry-card .ic-label { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.industry-card .ic-sub { font-size: 11px; color: var(--text-light); }

/* Size selector */
.size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.size-card { border: 2px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; text-align: center; transition: all 0.15s; }
.size-card:hover { border-color: var(--primary); }
.size-card.selected { border-color: var(--primary); background: var(--primary-light); }
.size-card .sz-label { font-size: 15px; font-weight: 600; }
.size-card .sz-rooms { font-size: 11px; color: var(--text-light); margin-top: 4px; }

/* Tags */
.tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--primary-light); color: var(--primary); border-radius: 20px; font-size: 13px; }
.tag .tag-remove { cursor: pointer; font-size: 16px; line-height: 1; opacity: 0.6; }
.tag .tag-remove:hover { opacity: 1; }
.tag-input-wrap { display: flex; gap: 8px; }
.tag-input-wrap input { flex: 1; }
.tag-input-wrap button { white-space: nowrap; }

/* Suggested tags */
.suggested-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.suggested-tag { padding: 3px 8px; background: #F0F0F0; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid transparent; }
.suggested-tag:hover { border-color: var(--primary); background: var(--primary-light); }

/* Use case checkboxes */
.usecase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.usecase-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; }
.usecase-item:hover { background: var(--primary-light); }
.usecase-item.checked { background: var(--primary-light); border-color: var(--primary); }
.usecase-item input { display: none; }

/* Buttons */
.btn { padding: 10px 24px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: white; color: var(--primary); border: 1px solid var(--primary); }
.btn-secondary:hover { background: var(--primary-light); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { opacity: 0.9; }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { opacity: 0.9; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Nav */
.nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
.nav-bar .nav-info { font-size: 13px; color: var(--text-light); }

/* Room design */
.room-category { margin-bottom: 24px; }
.room-category-header { font-size: 14px; font-weight: 700; color: var(--primary-dark); padding: 8px 0; border-bottom: 2px solid var(--primary); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.room-list { display: flex; flex-direction: column; gap: 8px; }
.room-item { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); background: white; transition: all 0.15s; }
.room-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.room-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: var(--bg); border-radius: 6px; cursor: pointer; position: relative; flex-shrink: 0; }
.room-info { flex: 1; min-width: 0; }
.room-name { font-size: 14px; font-weight: 600; }
.room-desc { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.room-badges { display: flex; gap: 6px; flex-shrink: 0; }
.room-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #EDF2F7; color: var(--text-light); }
.room-badge.msg { background: #E8F5E9; color: #2E7D32; }
.room-badge.task { background: #FFF8E1; color: #F57F17; }
.room-actions { display: flex; gap: 4px; flex-shrink: 0; }
.room-action-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 4px; background: white; cursor: pointer; font-size: 14px; }
.room-action-btn:hover { background: var(--bg); }
.room-action-btn.delete:hover { background: #FEE; color: var(--danger); border-color: var(--danger); }

/* Summary bar */
.summary-bar { display: flex; gap: 24px; padding: 16px 20px; background: var(--primary-light); border-radius: var(--radius); margin-bottom: 20px; }
.summary-item { text-align: center; }
.summary-num { font-size: 24px; font-weight: 700; color: var(--primary); }
.summary-label { font-size: 12px; color: var(--text-light); }

/* Icon picker */
.icon-picker-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); display: none; z-index: 100; align-items: center; justify-content: center; }
.icon-picker-overlay.show { display: flex; }
.icon-picker { background: white; border-radius: var(--radius); padding: 20px; max-width: 400px; width: 90%; }
.icon-picker h3 { margin-bottom: 12px; }
.icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.icon-option { width: 48px; height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 20px; transition: all 0.1s; }
.icon-option:hover { border-color: var(--primary); background: var(--primary-light); }
.icon-option.selected { border-color: var(--primary); background: var(--primary-light); }
.icon-option span { font-size: 8px; color: var(--text-light); }

/* Modal */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: var(--radius); padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 16px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* Demo preview */
.demo-room { margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius); }
.demo-room-header { padding: 12px 16px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-radius: var(--radius) var(--radius) 0 0; }
.demo-room-header h4 { font-size: 14px; }
.demo-room-body { padding: 16px; display: none; }
.demo-room.open .demo-room-body { display: block; }
.demo-msg { padding: 10px 14px; margin-bottom: 8px; background: #F8F9FA; border-radius: 6px; font-size: 13px; white-space: pre-wrap; word-break: break-word; border-left: 3px solid var(--primary-light); }
.demo-task { padding: 8px 12px; margin-bottom: 6px; background: #FFFDE7; border-radius: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.demo-task .task-limit { font-size: 11px; color: var(--text-light); }
.demo-section-label { font-size: 12px; font-weight: 600; color: var(--text-light); margin: 12px 0 6px; text-transform: uppercase; }

/* API execution */
.api-config { margin-bottom: 20px; }
.api-log { max-height: 400px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; background: #1a1a2e; color: #e0e0e0; }
.api-log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.api-log-entry.success { color: #4caf50; }
.api-log-entry.error { color: #f44336; }
.api-log-entry.info { color: #64b5f6; }
.progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 12px 0; }
.progress-bar-fill { height: 100%; background: var(--primary); transition: width 0.3s; border-radius: 4px; }

/* Edit inline */
.edit-inline { border: none; background: transparent; font-size: inherit; font-weight: inherit; font-family: inherit; color: inherit; padding: 2px 4px; border-radius: 4px; width: 100%; }
.edit-inline:focus { outline: none; background: #FFFDE7; border: 1px solid var(--warning); }

/* Add room form */
.add-room-form { display: grid; gap: 12px; }

/* Export/Import */
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

/* AI badge */
.ai-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: linear-gradient(135deg,#f3e8ff,#ede9fe); color: #6d28d9; border-radius: 10px; font-size: 10px; font-weight: 600; border: 1px solid #c4b5fd; }

/* AI Hearing Chat */
.hearing-chat { display: flex; flex-direction: column; gap: 16px; }
.hearing-bubble { max-width: 85%; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.7; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.hearing-bubble.ai { background: linear-gradient(135deg,#f3e8ff,#ede9fe); border: 1px solid #c4b5fd; align-self: flex-start; border-bottom-left-radius: 4px; }
.hearing-bubble.ai .bubble-label { font-size: 11px; font-weight: 700; color: #6d28d9; margin-bottom: 6px; }
.hearing-bubble.user { background: var(--primary-light); border: 1px solid #b3d4f0; align-self: flex-end; border-bottom-right-radius: 4px; }
.hearing-options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.hearing-opt { padding: 10px 16px; border: 2px solid #e0d4f5; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.15s; background: white; text-align: left; font-family: inherit; }
.hearing-opt:hover { border-color: #6d28d9; background: #faf5ff; }
.hearing-opt.selected { border-color: #6d28d9; background: #f3e8ff; font-weight: 600; }
.hearing-thinking { display: flex; align-items: center; gap: 8px; padding: 12px 18px; color: #6d28d9; font-size: 13px; }
.hearing-thinking .dots { display: inline-flex; gap: 4px; }
.hearing-thinking .dots span { width: 6px; height: 6px; background: #6d28d9; border-radius: 50%; animation: dotPulse 1.2s infinite; }
.hearing-thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
.hearing-thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
.hearing-summary { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 8px; }
.hearing-summary dt { font-size: 12px; font-weight: 600; color: var(--text-light); margin-top: 8px; }
.hearing-summary dt:first-child { margin-top: 0; }
.hearing-summary dd { font-size: 14px; margin-left: 0; margin-top: 2px; }

/* ============================================================
   Chatwork-like Preview UI
   ============================================================ */
.cw-preview-wrap { position: relative; }
.cw-preview-exit { position: absolute; top: -40px; right: 0; z-index: 10; }

.cw-container { display: flex; height: 80vh; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }

/* CW Header */
.cw-header { background: #3B7BBE; color: white; padding: 8px 16px; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; }
.cw-header-logo { font-size: 18px; letter-spacing: 1px; }

/* CW Sidebar */
.cw-sidebar { width: 260px; min-width: 260px; background: #F7F8FA; border-right: 1px solid #E0E0E0; display: flex; flex-direction: column; }
.cw-sidebar-header { padding: 12px 16px; background: #4D8DC9; color: white; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
.cw-sidebar-search { padding: 8px 12px; border-bottom: 1px solid #E0E0E0; }
.cw-sidebar-search input { width: 100%; padding: 6px 10px; border: 1px solid #D0D0D0; border-radius: 4px; font-size: 12px; background: white; }
.cw-room-list { flex: 1; overflow-y: auto; }
.cw-room-group-label { padding: 6px 16px; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; background: #EEF1F5; border-bottom: 1px solid #E0E0E0; }
.cw-room-entry { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #F0F0F0; transition: background 0.1s; }
.cw-room-entry:hover { background: #EBF0F7; }
.cw-room-entry.active { background: #D6E4F0; border-left: 3px solid #3B7BBE; }
.cw-room-entry-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.cw-room-entry-icon.green { background: #C8E6C9; }
.cw-room-entry-icon.blue { background: #BBDEFB; }
.cw-room-entry-icon.orange { background: #FFE0B2; }
.cw-room-entry-icon.purple { background: #E1BEE7; }
.cw-room-entry-icon.red { background: #FFCDD2; }
.cw-room-entry-icon.gray { background: #E0E0E0; }
.cw-room-entry-info { flex: 1; min-width: 0; }
.cw-room-entry-name { font-size: 13px; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cw-room-entry-last { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.cw-room-entry-badge { background: #E53935; color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; flex-shrink: 0; }

/* CW Main chat area */
.cw-main { flex: 1; display: flex; flex-direction: column; background: #FAFBFC; }
.cw-chat-header { padding: 12px 20px; background: white; border-bottom: 1px solid #E0E0E0; display: flex; align-items: center; justify-content: space-between; }
.cw-chat-header-title { font-size: 15px; font-weight: 700; color: #333; }
.cw-chat-header-desc { font-size: 11px; color: #999; margin-top: 2px; }
.cw-chat-header-actions { display: flex; gap: 8px; }
.cw-chat-header-actions button { padding: 4px 12px; font-size: 12px; border: 1px solid #D0D0D0; border-radius: 4px; background: white; cursor: pointer; color: #555; }
.cw-chat-header-actions button:hover { background: #F0F0F0; }
.cw-chat-header-actions button.active { background: #E8F1FA; border-color: #3B7BBE; color: #3B7BBE; }

/* CW Messages */
.cw-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; }
.cw-msg { display: flex; gap: 10px; padding: 8px 0; }
.cw-msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: #C5CAE9; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
.cw-msg-avatar.a1 { background: #5C6BC0; }
.cw-msg-avatar.a2 { background: #26A69A; }
.cw-msg-avatar.a3 { background: #EF5350; }
.cw-msg-avatar.a4 { background: #FFA726; }
.cw-msg-avatar.a5 { background: #AB47BC; }
.cw-msg-avatar.a6 { background: #42A5F5; }
.cw-msg-body { flex: 1; min-width: 0; }
.cw-msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.cw-msg-name { font-size: 13px; font-weight: 700; color: #3B7BBE; }
.cw-msg-time { font-size: 11px; color: #AAA; }
.cw-msg-text { font-size: 13px; color: #333; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.cw-msg-text .cw-info-block { border: 1px solid #D0E8D0; border-radius: 4px; margin: 6px 0; overflow: hidden; }
.cw-msg-text .cw-info-title { background: #E8F5E9; padding: 6px 12px; font-weight: 700; font-size: 13px; color: #2E7D32; border-bottom: 1px solid #D0E8D0; }
.cw-msg-text .cw-info-body { padding: 10px 12px; font-size: 13px; background: #FAFFF9; }
.cw-msg-separator { text-align: center; padding: 12px 0; }
.cw-msg-separator span { font-size: 11px; color: #AAA; background: #FAFBFC; padding: 0 12px; position: relative; }
.cw-msg-separator::before { content: ''; display: block; height: 1px; background: #E0E0E0; position: relative; top: 18px; }

/* CW Task Panel */
.cw-task-panel { width: 280px; min-width: 280px; background: white; border-left: 1px solid #E0E0E0; display: flex; flex-direction: column; }
.cw-task-panel.hidden { display: none; }
.cw-task-header { padding: 12px 16px; border-bottom: 1px solid #E0E0E0; font-size: 13px; font-weight: 700; color: #333; display: flex; align-items: center; justify-content: space-between; }
.cw-task-list { flex: 1; overflow-y: auto; padding: 8px; }
.cw-task-item { padding: 10px 12px; border: 1px solid #E8E8E8; border-radius: 6px; margin-bottom: 8px; background: white; }
.cw-task-item:hover { background: #FAFBFC; }
.cw-task-check { display: flex; align-items: flex-start; gap: 8px; }
.cw-task-checkbox { width: 18px; height: 18px; border: 2px solid #4CAF50; border-radius: 4px; flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cw-task-checkbox.done { background: #4CAF50; color: white; font-size: 12px; }
.cw-task-text { font-size: 13px; color: #333; flex: 1; }
.cw-task-meta { display: flex; justify-content: space-between; margin-top: 6px; padding-left: 26px; }
.cw-task-assignee { font-size: 11px; color: #888; }
.cw-task-due { font-size: 11px; color: #E65100; }
.cw-task-due.soon { color: #E53935; font-weight: 600; }

/* CW Input area */
.cw-input-area { padding: 12px 20px; background: white; border-top: 1px solid #E0E0E0; }
.cw-input-box { display: flex; gap: 8px; align-items: flex-end; }
.cw-input-textarea { flex: 1; min-height: 40px; max-height: 120px; padding: 10px 14px; border: 1px solid #D0D0D0; border-radius: 6px; font-size: 13px; font-family: inherit; resize: none; background: #FAFBFC; }
.cw-input-textarea:focus { outline: none; border-color: #3B7BBE; background: white; }
.cw-input-send { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.cw-input-send:hover { background: #43A047; }
.cw-input-toolbar { display: flex; gap: 12px; padding: 6px 0 0; }
.cw-input-toolbar button { background: none; border: none; font-size: 16px; cursor: pointer; color: #999; padding: 2px; }
.cw-input-toolbar button:hover { color: #555; }

/* CW Empty state */

<body>

<div class="header">
  <div>
    <h1>Chatwork ルーム設計デモツール</h1>
    <div class="header-sub">業種・規模に合わせたルーム設計とデモデータの投入</div>
  </div>
</div>

<div class="steps" id="stepIndicator"></div>

<div class="main" id="app"></div>

<!-- Icon Picker -->
<div class="icon-picker-overlay" id="iconPicker">
  <div class="icon-picker">
    <h3>アイコンを選択</h3>
    <div class="icon-grid" id="iconGrid"></div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn btn-secondary btn-sm" onclick="closeIconPicker()">閉じる</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script src="templates.js"></script>
<script src="demo-messages.js"></script>
<script>
// ============================================================
// State
// ============================================================
const STEPS = [
  { num: 1, label: 'ヒアリング' },
  { num: 2, label: 'ルーム設計' },
  { num: 3, label: 'カスタマイズ' },
  { num: 4, label: 'デモデータ確認' },
  { num: 5, label: 'プレビュー' },
  { num: 6, label: 'API実行' },
];

// Demo user names for preview
const DEMO_USERS = [
  { name: '山田 太郎', initials: '山田', cls: 'a1' },
  { name: '佐藤 花子', initials: '佐藤', cls: 'a2' },
  { name: '田中 一郎', initials: '田中', cls: 'a3' },
  { name: '鈴木 美咲', initials: '鈴木', cls: 'a4' },
  { name: '高橋 健太', initials: '高橋', cls: 'a5' },
  { name: '伊藤 直子', initials: '伊藤', cls: 'a6' },
];

let previewActiveRoom = null;
let previewShowTasks = true;

let state = loadState() || {
  step: 1,
  hearingPhase: 0, // 0=業種選択, 1~N=AI質問, 99=最終確認
  hearingQA: [],    // [{question, options, answer, round}]
  hearing: {
    industry: '',
    businessType: '',
    companySize: '',
    departments: [],
    useCases: [],
    freeText: '',
  },
  rooms: [],
  demoData: {},
  apiToken: localStorage.getItem('cw_api_token') || '',
  claudeApiKey: localStorage.getItem('cw_claude_api_key') || '',
  myAccountId: null,
  createdRoomIds: {},
};

function loadState() {
  try {
    const s = localStorage.getItem('cw_demo_state');
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}
function saveState() {
  localStorage.setItem('cw_demo_state', JSON.stringify(state));
}

// ============================================================
// Render
// ============================================================
function render() {
  renderSteps();
  const app = document.getElementById('app');
  app.classList.toggle('full-width', state.step === 5);
  switch (state.step) {
    case 1: renderStep1(app); break;
    case 2: renderStep2(app); break;
    case 3: renderStep3(app); break;
    case 4: renderStep4(app); break;
    case 5: renderPreview(app); break;
    case 6: renderStep6(app); break;
  }
  saveState();
}

function renderSteps() {
  const el = document.getElementById('stepIndicator');
  el.innerHTML = STEPS.map((s, i) => {
    const cls = s.num === state.step ? 'active' : (s.num < state.step ? 'completed' : '');
    const arrow = i < STEPS.length - 1 ? '<span class="step-arrow">▸</span>' : '';
    return `<div class="step-item ${cls}"><span class="step-num">${s.num < state.step ? '✓' : s.num}</span>${s.label}</div>${arrow}`;
  }).join('');
}

// ============================================================
// Step 1: Hearing
// ============================================================
function renderStep1(app) {
  const h = state.hearing;
  const phase = state.hearingPhase || 0;

  if (phase === 0) {
    // Phase 0: 業種選択
    app.innerHTML = `
      <div class="card">
        <h2>Step 1: ヒアリング</h2>
        <p style="color:var(--text-light);margin-bottom:20px">お客様の業種・規模に合わせたルーム設計を行います。まず業種を選択してください。</p>
        <div class="form-group">
          <label>業種・組織タイプ <span class="label-hint">※ 最も近いものを選択</span></label>
          <div class="industry-grid" id="industryGrid"></div>
        </div>
      </div>
    `;
    const ig = document.getElementById('industryGrid');
    ig.innerHTML = Object.entries(INDUSTRY_TEMPLATES).map(([key, tmpl]) => `
      <div class="industry-card ${h.industry===key?'selected':''}" onclick="selectIndustryAndStartAI('${key}')">
        <div class="ic-label">${tmpl.label}</div>
        <div class="ic-sub">${tmpl.subtitle}</div>
      </div>
    `).join('');

  } else if (phase === 99) {
    // Phase 99: 最終確認 + フリーテキスト
    renderStep1Final(app);

  } else {
    // Phase 1~N: AI対話ヒアリング
    renderStep1Chat(app);
  }
}

function renderStep1Chat(app) {
  const h = state.hearing;
  const qa = state.hearingQA || [];
  const tmpl = INDUSTRY_TEMPLATES[h.industry];
  const currentQ = qa.find(q => !q.answer);

  app.innerHTML = `
    <div class="card" style="max-width:700px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="margin-bottom:0">Step 1: ヒアリング</h2>
        <span style="font-size:12px;color:var(--text-light)">${tmpl?.label || ''}</span>
      </div>

      <div class="hearing-chat" id="hearingChat">
        ${qa.map((q, i) => `
          <div class="hearing-bubble ai">
            <div class="bubble-label">AI アシスタント</div>
            <div>${escHtml(q.question)}</div>
            ${q.answer ? '' : `
              <div class="hearing-options">
                ${q.options.map((opt, oi) => `
                  <button class="hearing-opt" onclick="answerHearingQuestion(${i}, ${oi})">${escHtml(typeof opt === 'string' ? opt : opt.label)}</button>
                `).join('')}
              </div>
            `}
          </div>
          ${q.answer ? `<div class="hearing-bubble user">${escHtml(q.answer)}</div>` : ''}
        `).join('')}
        <div id="hearingThinking" style="display:none">
          <div class="hearing-thinking">
            <div class="dots"><span></span><span></span><span></span></div>
            次の質問を考えています...
          </div>
        </div>
      </div>
    </div>

    <div class="nav-bar" style="max-width:700px;margin:16px auto 0">
      <button class="btn btn-secondary" onclick="resetHearing()">◂ 最初から</button>
      <button class="btn btn-secondary" onclick="skipToFinal()">スキップして最終確認へ ▸</button>
    </div>
  `;

  // スクロール
  const chat = document.getElementById('hearingChat');
  if (chat) chat.scrollTop = chat.scrollHeight;
}

function renderStep1Final(app) {
  const h = state.hearing;
  const qa = state.hearingQA || [];

  app.innerHTML = `
    <div class="card">
      <h2>Step 1: 最終確認</h2>
      <p style="color:var(--text-light);margin-bottom:16px">ヒアリング内容を確認し、必要に応じて修正してください。</p>

      <div class="hearing-summary">
        <dl>
          <dt>業種</dt><dd>${INDUSTRY_TEMPLATES[h.industry]?.label || h.industry}</dd>
          <dt>事業内容</dt><dd><input type="text" value="${escHtml(h.businessType)}" placeholder="事業内容を入力" oninput="state.hearing.businessType=this.value;saveState()"></dd>
          <dt>従業員数</dt>
          <dd>
            <div class="size-grid" id="sizeGrid" style="margin-top:6px"></div>
          </dd>
          <dt>部署・チーム構成</dt>
          <dd>
            <div class="tag-container" id="deptTags" style="margin-top:6px"></div>
            <div class="tag-input-wrap" style="margin-top:6px">
              <input type="text" id="deptInput" placeholder="部署名を追加" onkeydown="if(event.key==='Enter'){event.preventDefault();addDept()}">
              <button class="btn btn-secondary btn-sm" onclick="addDept()">追加</button>
            </div>
            <div class="suggested-tags" id="suggestedDepts"></div>
          </dd>
        </dl>
      </div>

      ${qa.length > 0 ? `
        <div style="margin-top:16px">
          <label>AIヒアリング回答</label>
          <div class="hearing-summary">
            ${qa.filter(q => q.answer).map(q => `
              <dt>${escHtml(q.question)}</dt>
              <dd>${escHtml(q.answer)}</dd>
            `).join('')}
          </div>
        </div>
      ` : ''}

      <div class="form-group" style="margin-top:16px">
        <label>その他リクエスト・補足情報 <span class="label-hint">（自由記述）</span></label>
        <textarea id="freeText" rows="4" placeholder="例：顧客対応は電話とFAXが中心。現場が5箇所あり写真共有が多い。協力会社3社と連携したい。など" oninput="state.hearing.freeText=this.value;saveState()">${escHtml(h.freeText||'')}</textarea>
      </div>
    </div>

    <div class="nav-bar">
      <button class="btn btn-secondary" onclick="resetHearing()">◂ 最初から</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="goToStep2()" ${!h.industry||!h.companySize?'disabled':''}>テンプレートで設計 ▸</button>
        <button class="btn btn-primary" onclick="goToStep2WithAI()" ${!h.industry||!h.companySize?'disabled':''} style="background:#6d28d9">AIで最適化 ▸</button>
      </div>
    </div>
  `;

  // Render size grid
  const sg = document.getElementById('sizeGrid');
  if (sg) sg.innerHTML = Object.entries(SIZE_SCALE).map(([key, s]) => `
    <div class="size-card ${h.companySize===key?'selected':''}" onclick="selectSize('${key}')">
      <div class="sz-label">${s.label}</div>
      <div class="sz-rooms">推奨 ${s.maxRooms}ルーム以内</div>
    </div>
  `).join('');

  renderDeptTags();
  renderSuggestedDepts();
}

function selectIndustry(key) {
  state.hearing.industry = key;
  const tmpl = INDUSTRY_TEMPLATES[key];
  if (tmpl && state.hearing.departments.length === 0) {
    state.hearing.departments = [...tmpl.suggestedDepts];
  }
  if (tmpl && state.hearing.useCases.length === 0) {
    state.hearing.useCases = [...(tmpl.useCases || [])];
  }
  render();
}

async function selectIndustryAndStartAI(key) {
  selectIndustry(key);
  state.hearingPhase = 1;
  state.hearingQA = [];
  saveState();
  render();
  await generateNextQuestion();
}

function resetHearing() {
  state.hearingPhase = 0;
  state.hearingQA = [];
  state.hearing = { industry: '', businessType: '', companySize: '', departments: [], useCases: [], freeText: '' };
  render();
}

function skipToFinal() {
  const h = state.hearing;
  const tmpl = INDUSTRY_TEMPLATES[h.industry];
  if (tmpl && h.departments.length === 0) {
    h.departments = [...tmpl.suggestedDepts];
  }
  state.hearingPhase = 99;
  render();
}

async function generateNextQuestion() {
  const h = state.hearing;
  const qa = state.hearingQA;
  const tmpl = INDUSTRY_TEMPLATES[h.industry];
  const round = qa.filter(q => q.answer).length + 1;

  // 3ラウンドで終了
  if (round > 3) {
    applyQAToHearing();
    state.hearingPhase = 99;
    render();
    return;
  }

  // thinking表示
  render();
  await sleep(100);
  const thinkEl = document.getElementById('hearingThinking');
  if (thinkEl) thinkEl.style.display = 'block';

  try {
    const systemPrompt = `あなたはChatwork導入コンサルタントです。企業にChatwork（ビジネスチャット）を提案するために、ヒアリングの質問を生成してください。

回答は必ず以下のJSON形式のみで返してください。余計な説明は不要です。
\`\`\`json
{
  "question": "質問文",
  "options": ["選択肢1", "選択肢2", "選択肢3", "選択肢4"]
}
\`\`\`

ルール:
- 質問は1つだけ
- 選択肢は3-5個
- 業種に特化した具体的な質問にする
- 選択肢も業種に即した具体的な内容にする
- ヒアリングの目的はChatworkのルーム設計に必要な情報を得ること
- 前の回答を踏まえて、より深掘りする質問を生成する`;

    const prevQA = qa.filter(q => q.answer).map(q => `Q: ${q.question}\nA: ${q.answer}`).join('\n\n');

    const userPrompt = `業種: ${tmpl?.label}（${tmpl?.subtitle}）
${h.businessType ? `事業内容: ${h.businessType}` : ''}

${prevQA ? `これまでのヒアリング:\n${prevQA}\n` : ''}

ラウンド ${round}/3 の質問を生成してください。
${round === 1 ? '最初の質問です。この業種の企業の規模感や事業の特徴を把握する質問をしてください。' : ''}
${round === 2 ? '2問目です。社内のコミュニケーションの現状や課題について聞いてください。' : ''}
${round === 3 ? '3問目です。Chatwork導入で特に改善したいポイントや、チーム構成について聞いてください。' : ''}`;

    const response = await callLLM(systemPrompt, userPrompt);

    let jsonStr = response;
    const jsonMatch = response.match(/```json\s*([\s\S]*?)\s*```/) || response.match(/\{[\s\S]*\}/);
    if (jsonMatch) jsonStr = jsonMatch[1] || jsonMatch[0];

    const parsed = JSON.parse(jsonStr);
    qa.push({
      question: parsed.question,
      options: parsed.options || [],
      answer: null,
      round: round,
    });

    saveState();
    render();
  } catch (err) {
    console.error('AI question generation failed:', err);
    // フォールバック: 固定質問
    const fallbackQuestions = [
      { question: '従業員数を教えてください。', options: ['1-10名', '11-30名', '31-100名', '100名以上'] },
      { question: '現在の社内コミュニケーション手段は？', options: ['メール中心', '電話・FAX中心', 'LINEなど個人チャット', '他のビジネスチャット', '対面が中心'] },
      { question: 'Chatwork導入で最も改善したいことは？', options: ['情報共有のスピード', 'タスク管理・進捗把握', '社外との連携', 'ペーパーレス化', 'リモートワーク対応'] },
    ];
    const fb = fallbackQuestions[round - 1] || fallbackQuestions[0];
    qa.push({ question: fb.question, options: fb.options, answer: null, round });
    saveState();
    render();
  }
}

async function answerHearingQuestion(qIdx, optIdx) {
  const qa = state.hearingQA;
  const q = qa[qIdx];
  if (!q || q.answer) return;

  const opt = q.options[optIdx];
  q.answer = typeof opt === 'string' ? opt : opt.label;
  saveState();
  render();

  // 回答から hearing に情報を反映
  extractFromAnswer(q);

  await sleep(500);
  await generateNextQuestion();
}

function extractFromAnswer(q) {
  const h = state.hearing;
  const answer = q.answer;

  // 従業員数を推測
  if (/1.*10名|〜10|10名以下|10人/.test(answer)) h.companySize = 'micro';
  else if (/11.*30|〜30|30名以下|20.*名|30人/.test(answer)) h.companySize = 'small';
  else if (/31.*100|〜100|50.*名|100名以下|80|60|70/.test(answer)) h.companySize = 'medium';
  else if (/100名以上|100.*超|200|300|500|大規模/.test(answer)) h.companySize = 'large';
}

function applyQAToHearing() {
  const h = state.hearing;
  const tmpl = INDUSTRY_TEMPLATES[h.industry];
  if (tmpl && h.departments.length === 0) {
    h.departments = [...tmpl.suggestedDepts];
  }
  // QA回答をfreeTextの補足として蓄積（AIプロンプトに渡すため）
  const qaText = state.hearingQA
    .filter(q => q.answer)
    .map(q => `${q.question} → ${q.answer}`)
    .join('\n');
  if (qaText && !h.freeText.includes(qaText)) {
    h.freeText = (h.freeText ? h.freeText + '\n\n' : '') + '【AIヒアリング回答】\n' + qaText;
  }
  saveState();
}

function selectSize(key) {
  state.hearing.companySize = key;
  render();
}

function addDept() {
  const input = document.getElementById('deptInput');
  const val = input.value.trim();
  if (val && !state.hearing.departments.includes(val)) {
    state.hearing.departments.push(val);
    input.value = '';
    renderDeptTags();
    saveState();
  }
}

function removeDept(dept) {
  state.hearing.departments = state.hearing.departments.filter(d => d !== dept);
  renderDeptTags();
  saveState();
}

function renderDeptTags() {
  const el = document.getElementById('deptTags');
  if (!el) return;
  el.innerHTML = state.hearing.departments.map(d =>
    `<span class="tag">${escHtml(d)}<span class="tag-remove" onclick="removeDept('${escHtml(d)}')">&times;</span></span>`
  ).join('');
}

function renderSuggestedDepts() {
  const el = document.getElementById('suggestedDepts');
  if (!el) return;
  const tmpl = INDUSTRY_TEMPLATES[state.hearing.industry];
  if (!tmpl) { el.innerHTML = ''; return; }
  const existing = new Set(state.hearing.departments);
  const suggestions = tmpl.suggestedDepts.filter(d => !existing.has(d));
  el.innerHTML = suggestions.length ? '<span style="font-size:11px;color:var(--text-light)">候補：</span>' + suggestions.map(d =>
    `<span class="suggested-tag" onclick="state.hearing.departments.push('${d}');render()">+ ${d}</span>`
  ).join('') : '';
}

function toggleUseCase(uc) {
  const idx = state.hearing.useCases.indexOf(uc);
  if (idx >= 0) state.hearing.useCases.splice(idx, 1);
  else state.hearing.useCases.push(uc);
  render();
}

function goToStep2() {
  state.rooms = generateRooms(state.hearing);
  state.demoData = generateDemoData(state.rooms);
  state.step = 2;
  render();
}

// ============================================================
// Claude API Integration
// ============================================================

const LLM_PROXY_URL = 'https://cw-demo-gemini-proxy.fukuda-690.workers.dev';

async function callLLM(systemPrompt, userPrompt) {
  const res = await fetch(LLM_PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: systemPrompt }] },
      contents: [{ parts: [{ text: userPrompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 8000 },
    }),
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`AI API Error ${res.status}: ${err}`);
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

function showLoadingOverlay(message) {
  const overlay = document.createElement('div');
  overlay.id = 'aiLoadingOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(109,40,217,0.15);z-index:999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)';
  overlay.innerHTML = `
    <div style="background:white;padding:32px 48px;border-radius:12px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.15)">
      <div style="font-size:32px;margin-bottom:12px;animation:spin 2s linear infinite">🤖</div>
      <div style="font-size:16px;font-weight:600;color:#6d28d9;margin-bottom:8px">AI最適化中...</div>
      <div style="font-size:13px;color:#888" id="aiLoadingMsg">${message}</div>
    </div>
    <style>@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}</style>
  `;
  document.body.appendChild(overlay);
}

function updateLoadingMessage(msg) {
  const el = document.getElementById('aiLoadingMsg');
  if (el) el.textContent = msg;
}

function hideLoadingOverlay() {
  const el = document.getElementById('aiLoadingOverlay');
  if (el) el.remove();
}

async function goToStep2WithAI() {
  const h = state.hearing;
  const template = INDUSTRY_TEMPLATES[h.industry];
  if (!template) return goToStep2();

  showLoadingOverlay('ヒアリング内容を分析してルーム構成を最適化しています...');

  try {
    // まずテンプレートベースで生成（フォールバック用）
    const baseRooms = generateRooms(h);

    const systemPrompt = `あなたはChatwork（ビジネスチャットツール）のルーム設計の専門家です。
企業のヒアリング情報に基づいて、最適なChatworkのグループチャット（ルーム）構成を提案してください。

回答は必ず以下のJSON形式のみで返してください。説明文は不要です。
\`\`\`json
[
  {
    "name": "【カテゴリ】ルーム名",
    "icon": "group",
    "description": "このルームの用途",
    "category": "カテゴリ名"
  }
]
\`\`\`

使用可能なicon値: group, check, document, meeting, event, project, business, study, security, star, idea, heart, magicwand, beer, music, sports, travel

ルーム命名ルール:
- 全社系: 【全社】連絡、【全社】雑談
- 部門系: 【部門名】
- プロジェクト/案件系: 【PJ】名前、【案件】名前、【顧問先】名前、【現場】名前
- 横断系: 【共有】名前、【連携】名前
- 外部: 【外部】名前

業種に応じた専門的なルーム名にしてください（例：建設なら「現場」、士業なら「顧問先」、医療なら「病棟」など）。`;

事業内容: ${h.businessType || '未入力'}
従業員数: ${SIZE_SCALE[h.companySize]?.label || '不明'}
部署構成: ${h.departments.join('、')}
主な用途: ${h.useCases.join('、')}
${h.freeText ? `\nお客様からのリクエスト・補足情報:\n${h.freeText}` : ''}

テンプレートのベース構成（参考）:
${baseRooms.map(r => `- ${r.name}（${r.category}）: ${r.description}`).join('\n')}

このベースを参考にしつつ、この企業の特性に合わせて最適化してください。

${SIZE_SCALE[h.companySize]?.maxRooms || 15}ルーム程度で提案してください。`;

    const response = await callLLM(systemPrompt, userPrompt);

    let jsonStr = response;
    const jsonMatch = response.match(/```json\s*([\s\S]*?)\s*```/) || response.match(/\[[\s\S]*\]/);

    const aiRooms = JSON.parse(jsonStr);

}

// ルーム名・説明からarchetypeを推測する
function guessArchetype(name, desc, category) {
  const text = (name + ' ' + desc + ' ' + category).toLowerCase();
  const map = [
    [/雑談|つぶやき|フリー|交流/, 'casual'],
    [/日報|週報|報告/, 'daily_report'],
    [/経営|役員|幹部/, 'management'],
    [/総務|経理|事務|請求|勤怠/, 'admin_general'],
    [/全社|全体|連絡|お知らせ/, 'company_announce'],
    [/シフト|勤務/, 'shift'],
    [/申し送り|引き継ぎ|引継/, 'handover'],
    [/安全|衛生|ヒヤリ/, 'safety'],
    [/品質|検査|クレーム対応/, 'quality'],
    [/在庫|発注|仕入/, 'inventory'],
    [/売上|レポート/, 'sales_report'],
    [/現場|工事|施工/, 'construction_site'],
    [/案件|提案|商談/, 'project_deal'],
    [/顧問先|クライアント|顧客別/, 'client_project'],
    [/期日|申告|届出|スケジュール管理/, 'deadline_mgmt'],
    [/法改正|通達|制度/, 'legal_update'],
    [/インシデント|事故|ヒヤリハット/, 'incident'],
    [/委員会|感染|対策/, 'committee'],
    [/研修|勉強会|カンファ/, 'study_session'],
    [/物件|不動産/, 'property_info'],
    [/内見/, 'viewing_report'],
    [/契約|決済/, 'contract_mgmt'],
    [/オーナー/, 'owner_support'],
    [/求人|採用|ポジション/, 'job_posting'],
    [/マッチング/, 'matching'],
    [/フォロー|派遣スタッフ/, 'staff_follow'],
    [/成約|受注報告/, 'wins'],
    [/イベント|行事/, 'event_planning'],
    [/受注|注文/, 'order_mgmt'],
    [/製造|生産|加工/, 'production'],
    [/連携|横断/, 'cross_function'],
    [/外部|協力|パートナー|業者/, 'external_partner'],
    [/ナレッジ|共有|事例|情報/, 'knowledge'],
    [/pj|プロジェクト/, 'project_internal'],
    [/デザイン|制作|クリエイティブ/, 'creative_project'],
    [/レセプト|請求.*医|診療/, 'admin_billing'],
    [/店舗|営業報告/, 'store_ops'],
    [/クレーム|cs|改善/, 'customer_issue'],
  ];
  for (const [re, archetype] of map) {
    if (re.test(text)) return archetype;
  }
  return 'department';
}

// AI でデモメッセージを動的生成
async function generateDemoWithAI() {
  const h = state.hearing;
  const template = INDUSTRY_TEMPLATES[h.industry];
  showLoadingOverlay('業種に特化したデモメッセージを生成しています...');

  try {
    // ルームを5件ずつバッチ処理（API負荷軽減）
    const rooms = state.rooms;
    const batchSize = 5;

    for (let i = 0; i < rooms.length; i += batchSize) {
      const batch = rooms.slice(i, i + batchSize);
      updateLoadingMessage(`デモデータ生成中... (${Math.min(i + batchSize, rooms.length)}/${rooms.length} ルーム)`);

      const systemPrompt = `あなたはChatwork（ビジネスチャットツール）のデモデータ作成の専門家です。
指定されたルームに投稿されるリアルなメッセージとタスクを生成してください。

回答は必ず以下のJSON形式のみで返してください。
\`\`\`json
{
  "room_id": {
    "messages": [
      { "body": "メッセージ本文" }
    ],
    "tasks": [
      { "body": "タスク内容", "limitDays": 5, "limitType": "date" }
    ]
  }
}
\`\`\`

メッセージのルール:
- Chatwork記法を使用: [info][title]タイトル[/title]本文[/info]
- 顔文字: (smile) (thumbsup) (bow) (clap)
- 1ルームあたり12-18件のメッセージ
- タスクは3-6件
- 複数人の会話（リアクション、質問、回答の往復）
- 業種に即した専門用語・数値を含める
- limitTypeは "date" または "time"`;

      const userPrompt = `以下の企業のChatworkルームにふさわしいデモメッセージを生成してください。

企業情報:
- 業種: ${template?.label || h.industry}
- 事業内容: ${h.businessType || '一般的な' + (template?.label || '')}
- 規模: ${SIZE_SCALE[h.companySize]?.label || '中小企業'}
${h.freeText ? `- お客様の補足情報: ${h.freeText}` : ''}

対象ルーム:
${batch.map(r => `- ID: "${r.id}" / 名前: "${r.name}" / 説明: "${r.description}" / カテゴリ: "${r.category}"`).join('\n')}

各ルームに12-18件のリアルなメッセージと3-6件のタスクを生成してください。
実際の業務で交わされるような具体的な会話にしてください。
${h.freeText ? 'お客様の補足情報に記載された課題やリクエストを会話内容に反映させてください。' : ''}`;

      const response = await callLLM(systemPrompt, userPrompt);

      // JSONを抽出
      let jsonStr = response;
      const jsonMatch = response.match(/```json\s*([\s\S]*?)\s*```/) || response.match(/\{[\s\S]*\}/);
      if (jsonMatch) jsonStr = jsonMatch[1] || jsonMatch[0];

      try {
        const aiData = JSON.parse(jsonStr);
        for (const room of batch) {
          if (aiData[room.id]) {
            state.demoData[room.id] = {
              messages: (aiData[room.id].messages || []).map(m => ({ body: m.body })),
              tasks: (aiData[room.id].tasks || []).map(t => ({
                body: t.body,
                limitDays: t.limitDays,
                limitType: t.limitType || 'date',
                limit: t.limitDays !== undefined ? Math.floor(Date.now() / 1000) + t.limitDays * 86400 : undefined,
              })),
            };
          }
        }
      } catch (parseErr) {
        console.warn('AI response parse error for batch:', parseErr);
        // パース失敗したルームはテンプレートデータのまま
      }

      // レート制限対策
      if (i + batchSize < rooms.length) await sleep(1000);
    }

    saveState();
    state.step = 4;
    hideLoadingOverlay();
    render();
  } catch (err) {
    hideLoadingOverlay();
    alert(`AIデモデータ生成に失敗しました。テンプレートデータで進めます。\n\nエラー: ${err.message}`);
    state.step = 4;
    render();
  }
}

// Room editing functions

function updateRoomDesc(id, val) {

  const selectedIcon = document.querySelector('.add-room-form .icon-option.selected');
  const icon = selectedIcon ? selectedIcon.dataset.icon : 'group';
  const archetype = document.getElementById('newRoomArchetype').value;

  const id = `room_${Date.now()}`;
  state.rooms.push({ id, name, icon, description: desc, category, archetype });

  if (archetype && DEMO_CONTENT[archetype]) {
    const content = DEMO_CONTENT[archetype];
    state.demoData[id] = {
      messages: content.messages.map(m => ({ ...m })),
      tasks: content.tasks.map(t => ({
        ...t,
        limit: t.limitDays !== undefined ? Math.floor(Date.now()/1000) + t.limitDays * 86400 : undefined,

    };
  } else {
    state.demoData[id] = { messages: [], tasks: [] };

  closeModal();
  render();

// Export/Import
function exportConfig() {
  const data = { hearing: state.hearing, rooms: state.rooms, demoData: state.demoData };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cw-room-design_${state.hearing.industry}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importConfig(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.rooms) state.rooms = data.rooms;
      if (data.demoData) state.demoData = data.demoData;
      if (data.hearing) state.hearing = data.hearing;
      render();
    } catch { alert('ファイルの読み込みに失敗しました'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

}

function removeDemoMsg(roomId, idx) {

function formatCwMessage(body) {
  let html = escHtml(body);
  // [info][title]...[/title]...[/info]
  html = html.replace(/\[info\]\[title\](.*?)\[\/title\]([\s\S]*?)\[\/info\]/g,
    '<div style="border:1px solid var(--border);border-radius:4px;margin:4px 0"><div style="background:var(--bg);padding:4px 8px;font-weight:600;font-size:12px;border-bottom:1px solid var(--border)">$1</div><div style="padding:8px;font-size:12px">$2</div></div>');
  html = html.replace(/\[info\]([\s\S]*?)\[\/info\]/g,
    '<div style="border:1px solid var(--border);border-radius:4px;padding:8px;margin:4px 0;font-size:12px">$1</div>');
  html = html.replace(/\[code\]([\s\S]*?)\[\/code\]/g,
    '<pre style="background:#f5f5f5;padding:8px;border-radius:4px;font-size:11px;overflow-x:auto">$1</pre>');
  html = html.replace(/\[hr\]/g, '<hr style="border:none;border-top:1px solid var(--border);margin:8px 0">');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function formatDate(unix) {
  const d = new Date(unix * 1000);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function renderPreview(app) {

  const activeData = activeRoom ? (state.demoData[activeRoom.id] || { messages: [], tasks: [] }) : { messages: [], tasks: [] };

  const now = new Date();
  function fakeTime(idx, total) {
    const baseMinutes = (total - idx) * 7 + Math.floor(Math.random() * 5);
    const t = new Date(now.getTime() - baseMinutes * 60000);
    return t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
  }

  // Color for category
  function catColor(cat) {
    const colors = ['green','blue','orange','purple','red','gray'];
    const idx = categories.indexOf(cat);
    return colors[idx % colors.length];
  }

  app.innerHTML = `
    <div class="cw-preview-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>

        </div>

        <div>
          <button class="btn btn-primary btn-sm" onclick="state.step=6;render()">API実行へ ▸</button>
        </div>
      </div>

      <div class="cw-container">
        <!-- Sidebar -->
        <div class="cw-sidebar">
          <div class="cw-sidebar-header">
            <span>Chatwork</span>

          </div>
          <div class="cw-sidebar-search">
            <input type="text" placeholder="チャットを検索" disabled>
          </div>
          <div class="cw-room-list">
            ${categories.map(cat => `
              <div class="cw-room-group-label">${escHtml(cat)}</div>
              ${rooms.filter(r => r.category === cat).map(r => {
                const icon = ICON_OPTIONS.find(i => i.id === r.icon);
                const data = state.demoData[r.id] || { messages: [], tasks: [] };
                const lastMsg = data.messages.length > 0 ? data.messages[data.messages.length - 1].body.replace(/\[.*?\]/g, '').substring(0, 30) : '';

                return `
                  <div class="cw-room-entry ${r.id === previewActiveRoom ? 'active' : ''}" onclick="previewActiveRoom='${r.id}';renderPreviewContent()">
                    <div class="cw-room-entry-icon ${catColor(cat)}">${icon?.emoji || '📁'}</div>

              }).join('')}

        <!-- Main chat + tasks -->
        <div class="cw-main" id="cwMainArea">
          ${activeRoom ? renderCwChatArea(activeRoom, activeData, fakeTime) : '<div class="cw-empty"><div class="cw-empty-icon">💬</div><div class="cw-empty-text">ルームを選択してください</div></div>'}

        </div>
      </div>
    </div>
  `;

function renderPreviewContent() {
  const rooms = state.rooms;
  const activeRoom = rooms.find(r => r.id === previewActiveRoom);
  const activeData = activeRoom ? (state.demoData[activeRoom.id] || { messages: [], tasks: [] }) : { messages: [], tasks: [] };
  const now = new Date();
  function fakeTime(idx, total) {
    const baseMinutes = (total - idx) * 7 + Math.floor(Math.random() * 5);
    const t = new Date(now.getTime() - baseMinutes * 60000);
    return t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
  }

  // Update active state in sidebar
  document.querySelectorAll('.cw-room-entry').forEach(el => el.classList.remove('active'));
  const entries = document.querySelectorAll('.cw-room-entry');
  const roomIds = state.rooms.map(r => r.id);
  const activeIdx = roomIds.indexOf(previewActiveRoom);
  if (entries[activeIdx]) entries[activeIdx].classList.add('active');

  // Update main area
  if (activeRoom) {
    document.getElementById('cwMainArea').innerHTML = renderCwChatArea(activeRoom, activeData, fakeTime);
    document.getElementById('cwTaskPanel').innerHTML = renderCwTaskPanel(activeRoom, activeData);
    // Scroll to bottom of messages
    const msgEl = document.querySelector('.cw-messages');
    if (msgEl) msgEl.scrollTop = msgEl.scrollHeight;
  }
}

    <div class="cw-input-area">

        <button class="cw-input-send">送信</button>
      </div>
      <div class="cw-input-toolbar">
        <button title="絵文字">😊</button>
        <button title="TO">@</button>
        <button title="ファイル">📎</button>
        <button title="タスク">☑️</button>
        <button title="引用">"</button>

function renderCwTaskPanel(room, data) {
  const tasks = data.tasks || [];
  return `
    <div class="cw-task-header">
      <span>タスク（${tasks.length}）</span>
      <span style="font-size:11px;color:#999">未完了</span>
    </div>
    <div class="cw-task-list">
      ${tasks.length === 0 ? '<div style="text-align:center;padding:24px;color:#AAA;font-size:13px">タスクはありません</div>' : ''}
      ${tasks.map((t, i) => {
        const user = DEMO_USERS[i % DEMO_USERS.length];
        const dueDate = t.limit ? formatDate(t.limit) : '';
        const daysLeft = t.limit ? Math.ceil((t.limit - Date.now()/1000) / 86400) : null;
        const dueClass = daysLeft !== null && daysLeft <= 3 ? 'soon' : '';
        return `
          <div class="cw-task-item">
            <div class="cw-task-check">
              <div class="cw-task-checkbox"></div>
              <div class="cw-task-text">${escHtml(t.body)}</div>
            </div>
            <div class="cw-task-meta">
              <span class="cw-task-assignee">${user.name}</span>
              ${dueDate ? `<span class="cw-task-due ${dueClass}">${dueDate}まで</span>` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function formatCwPreviewMessage(body) {
  let html = escHtml(body);
  // [info][title]...[/title]...[/info] → Chatwork-like info block
  html = html.replace(/\[info\]\[title\](.*?)\[\/title\]([\s\S]*?)\[\/info\]/g,
    '<div class="cw-info-block"><div class="cw-info-title">$1</div><div class="cw-info-body">$2</div></div>');
  html = html.replace(/\[info\]([\s\S]*?)\[\/info\]/g,
    '<div class="cw-info-block"><div class="cw-info-body">$1</div></div>');
  html = html.replace(/\[code\]([\s\S]*?)\[\/code\]/g,
    '<pre style="background:#F5F5F5;padding:8px;border-radius:4px;font-size:12px;font-family:monospace;overflow-x:auto;margin:4px 0">$1</pre>');
  html = html.replace(/\[hr\]/g, '<hr style="border:none;border-top:1px solid #E0E0E0;margin:8px 0">');
  // Emoticons
  html = html.replace(/\(smile\)/g, '😊');
  html = html.replace(/\(bow\)/g, '🙇');
  html = html.replace(/\(thumbsup\)/g, '👍');
  html = html.replace(/\(clap\)/g, '👏');
  html = html.replace(/\(muscle\)/g, '💪');
  html = html.replace(/\(sports\)/g, '⚽');
  html = html.replace(/\n/g, '<br>');
  return html;
}

// ============================================================
// Step 6: API Execution
// ============================================================
function renderStep6(app) {
  app.innerHTML = `
    <div class="card">
      <h2>Step 6: API実行</h2>
      <p style="color:var(--text-light);margin-bottom:20px">Chatwork APIを使ってルームの作成とデモデータの投入を行います。</p>

      <div class="api-config">
        <div class="form-group">
          <label>Chatwork APIトークン</label>
          <div style="display:flex;gap:8px">
            <input type="password" id="apiToken" value="${escHtml(state.apiToken)}" placeholder="APIトークンを入力" oninput="state.apiToken=this.value;localStorage.setItem('cw_api_token',this.value);saveState()">
            <button class="btn btn-secondary btn-sm" onclick="testConnection()">接続テスト</button>
          </div>
          <div style="font-size:11px;color:var(--text-light);margin-top:4px">
            APIトークンは <a href="https://www.chatwork.com/service/packages/chatwork/subpackages/api/token.php" target="_blank">こちら</a> から取得できます
          </div>
        </div>

        <div id="connectionResult"></div>

        </div>
      </div>

      <div class="summary-bar">
        <div class="summary-item"><div class="summary-num">${state.rooms.length}</div><div class="summary-label">ルーム作成</div></div>
        <div class="summary-item"><div class="summary-num">${Object.values(state.demoData).reduce((s,d)=>s+d.messages.length,0)}</div><div class="summary-label">メッセージ投稿</div></div>
        <div class="summary-item"><div class="summary-num">${Object.values(state.demoData).reduce((s,d)=>s+d.tasks.length,0)}</div><div class="summary-label">タスク作成</div></div>
      </div>

      <div style="margin-bottom:16px">
        <button class="btn btn-success" onclick="executeAll()" id="executeBtn" ${!state.apiToken?'disabled':''}>
          実行開始
        </button>
        <button class="btn btn-secondary" onclick="resetExecution()" style="margin-left:8px">リセット</button>
      </div>

        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>

      <div class="api-log" id="apiLog" style="display:none"></div>
    </div>

async function testConnection() {
  const token = state.apiToken;
  if (!token) { alert('APIトークンを入力してください'); return; }
  const el = document.getElementById('connectionResult');
  el.innerHTML = '<p style="color:var(--text-light)">接続テスト中...</p>';

  try {
    const res = await cwApi('GET', '/me', null, token);
    state.myAccountId = res.account_id;
    saveState();
    el.innerHTML = `
      <div style="padding:12px;background:#E8F5E9;border-radius:var(--radius);margin:8px 0">
        <strong style="color:#2E7D32">接続成功</strong><br>
        <span style="font-size:13px">アカウント: ${escHtml(res.name)}（ID: ${res.account_id}）</span>
      </div>
    `;
  } catch (err) {
    el.innerHTML = `
      <div style="padding:12px;background:#FFEBEE;border-radius:var(--radius);margin:8px 0">
        <strong style="color:var(--danger)">接続失敗</strong><br>
        <span style="font-size:13px">${escHtml(err.message)}</span>
      </div>
    `;
  }
}

async function cwApi(method, path, body, token) {
  const url = `https://api.chatwork.com/v2${path}`;
  const headers = { 'X-ChatWorkToken': token || state.apiToken };
  const opts = { method, headers };
  if (body) {
    headers['Content-Type'] = 'application/x-www-form-urlencoded';
    opts.body = new URLSearchParams(body).toString();
  }
  const res = await fetch(url, opts);
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`API Error ${res.status}: ${text}`);
  }
  return res.json();
}

async function executeAll() {
  if (!state.apiToken) { alert('APIトークンを入力してください'); return; }
  if (!state.myAccountId) {
    try {
      const me = await cwApi('GET', '/me');
      state.myAccountId = me.account_id;
    } catch {
      alert('接続テストを先に実行してください');
      return;
    }
  }

  const memberInput = document.getElementById('memberIds').value.trim();
  const additionalMembers = memberInput ? memberInput.split(',').map(s => s.trim()).filter(Boolean) : [];
  const adminIds = [String(state.myAccountId), ...additionalMembers].join(',');

  const rooms = state.rooms;
  const totalOps = rooms.length + Object.values(state.demoData).reduce((s, d) => s + d.messages.length + d.tasks.length, 0);
  let completedOps = 0;

  document.getElementById('executeBtn').disabled = true;
  document.getElementById('progressBar').style.display = 'block';
  const logEl = document.getElementById('apiLog');
  logEl.style.display = 'block';
  logEl.innerHTML = '';

  function log(msg, type = 'info') {
    const entry = document.createElement('div');
    entry.className = `api-log-entry ${type}`;
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function updateProgress() {
    completedOps++;
    const pct = Math.round((completedOps / totalOps) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${completedOps} / ${totalOps} (${pct}%)`;
  }

  log('実行を開始します...');

  for (const room of rooms) {
    if (state.createdRoomIds[room.id]) {
      log(`スキップ（作成済み）: ${room.name}`, 'info');
      updateProgress();
      continue;
    }

    try {
      log(`ルーム作成中: ${room.name}`);
      const params = {
        name: room.name,
        description: room.description || '',
        icon_preset: room.icon || 'group',
        members_admin_ids: adminIds,
      };
      const result = await cwApi('POST', '/rooms', params);
      const roomId = result.room_id;
      state.createdRoomIds[room.id] = roomId;
      saveState();
      log(`ルーム作成完了: ${room.name} (ID: ${roomId})`, 'success');
      updateProgress();

      // Post messages
      const data = state.demoData[room.id] || { messages: [], tasks: [] };
      for (const msg of data.messages) {
        try {
          await cwApi('POST', `/rooms/${roomId}/messages`, { body: msg.body });
          log(`  メッセージ投稿: ${room.name}`, 'success');
        } catch (err) {
          log(`  メッセージ投稿失敗: ${err.message}`, 'error');
        }
        updateProgress();
        await sleep(350); // rate limit
      }

      // Create tasks
      for (const task of data.tasks) {
        try {
          const taskParams = {
            body: task.body,
            to_ids: String(state.myAccountId),
          };
          if (task.limit) {
            taskParams.limit = task.limit;
            taskParams.limit_type = task.limitType || 'date';
          }
          await cwApi('POST', `/rooms/${roomId}/tasks`, taskParams);
          log(`  タスク作成: ${task.body}`, 'success');
        } catch (err) {
          log(`  タスク作成失敗: ${err.message}`, 'error');
        }
        updateProgress();
        await sleep(350);
      }

    } catch (err) {
      log(`ルーム作成失敗: ${room.name} - ${err.message}`, 'error');
      updateProgress();
    }

    await sleep(300);
  }

  log('全ての処理が完了しました！', 'success');
  document.getElementById('executeBtn').disabled = false;
}

function resetExecution() {
  state.createdRoomIds = {};
  saveState();
  render();
}

function resetAll() {
  if (!confirm('全ての設定をリセットしますか？')) return;
  state = {
    step: 1,
    hearing: { industry: '', businessType: '', companySize: '', departments: [], useCases: [] },
    rooms: [],
    demoData: {},
    apiToken: state.apiToken,
    myAccountId: state.myAccountId,
    createdRoomIds: {},
  };
  render();
}

// ============================================================
// Utilities
// ============================================================
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ============================================================
// Init
// ============================================================
render();
